name: Publicador Diario

# El disparo a horario lo hace cron-job.org (disparador externo confiable, en hora de
# Argentina) llamando a la API de workflow_dispatch. NO se usa el scheduler nativo de
# GitHub (schedule:) porque no es confiable y chocaba con cron-job.org.
# Tambien se puede correr a mano desde la pestana Actions -> Run workflow.
on:
  workflow_dispatch:
    inputs:
      args:
        description: 'Argumentos para main.py (ej: --dry-run | --canal-story | --run-now --pages 3,5,7)'
        required: true
        default: '--dry-run'

# Evita que dos corridas se pisen (importante para no corromper los registros).
concurrency:
  group: publicador
  cancel-in-progress: false

# Necesario para commitear de vuelta los registros anti-repeticion.
permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    # El runner corre en UTC; con esto Python usa hora de Argentina para
    # date.today()/now() (clave para detectar la "edicion de hoy" y los ledgers diarios).
    env:
      TZ: America/Argentina/Buenos_Aires
    steps:
      - name: Bajar el codigo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar fuentes y ffmpeg (historias 9:16 + reel en video)
        run: sudo apt-get update && sudo apt-get install -y fonts-liberation fonts-dejavu-core ffmpeg

      - name: Instalar dependencias de Python
        run: pip install -r requirements.txt

      - name: Instalar rclone
        run: |
          sudo -v
          curl https://rclone.org/install.sh | sudo bash

      - name: Escribir credenciales (.env) y config de Drive (rclone)
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          printf '%s' "$ENV_FILE" > .env
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

      - name: Bajar la carpeta del dia desde Google Drive
        run: |
          mkdir -p diario
          # Asegura que las carpetas existan aunque esten vacias en Drive
          mkdir -p "diario/NOTAS AUTOMATICAS" "diario/DIARIO PDF"
          # Los comandos de video (desgrabador) NO necesitan toda la carpeta Diario:
          # saltear el sync pesado acelera esas corridas varios minutos.
          ARGS="${{ github.event.inputs.args }}"
          if echo "$ARGS" | grep -q -- "video"; then
            echo "Comando de video: se saltea el sync completo de gdrive:Diario."
          else
            rclone sync "gdrive:Diario" diario
          fi

      - name: Bajar videos de actualidad desde Google Drive (desgrabador)
        run: |
          mkdir -p videos
          # La carpeta "videos notas actualidad" puede estar dentro de Diario o en la raiz del Drive.
          rclone copy "gdrive:Diario/videos notas actualidad" videos 2>/dev/null || true
          rclone copy "gdrive:videos notas actualidad" videos 2>/dev/null || true

      - name: Restaurar registros anti-repeticion
        run: |
          [ -f "state/.publicado.json" ] && cp "state/.publicado.json" "diario/NOTAS AUTOMATICAS/.publicado.json" || true
          [ -f "state/.historias.json" ] && cp "state/.historias.json" "diario/NOTAS AUTOMATICAS/.historias.json" || true
          [ -f "state/.web.json" ] && cp "state/.web.json" "diario/NOTAS AUTOMATICAS/.web.json" || true
          for f in .tapa.json .farmacias.json .farmacias_cache.json .canal_story.json youtube-historias.json .newsletter.json .reel.json .videos_contabilidad.json; do
            [ -f "state/$f" ] && cp "state/$f" "./$f" || true
          done

      - name: Determinar el comando segun el horario
        id: cmd
        run: |
          case "${{ github.event.schedule }}" in
            "0 3 * * *")      echo 'args=--tapa' >> "$GITHUB_OUTPUT" ;;
            "0 10 * * *")     echo 'args=--run-now --pages 3,5,7' >> "$GITHUB_OUTPUT" ;;
            "15 10 * * *")    echo 'args=--news-stories' >> "$GITHUB_OUTPUT" ;;
            "0 11 * * *")     echo 'args=--farmacias' >> "$GITHUB_OUTPUT" ;;
            "45 13 * * 1-5")  echo 'args=--yt-live' >> "$GITHUB_OUTPUT" ;;
            "0 16 * * *")     echo 'args=--run-now --pages 8,9' >> "$GITHUB_OUTPUT" ;;
            "30 16 * * *")    echo 'args=--yt-notes' >> "$GITHUB_OUTPUT" ;;
            "0 20 * * *")     echo 'args=--canal-story' >> "$GITHUB_OUTPUT" ;;
            *)                echo 'args=${{ github.event.inputs.args }}' >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Publicar
        env:
          POSTS_FOLDER: ${{ github.workspace }}/diario/NOTAS AUTOMATICAS
          TAPA_FOLDER: ${{ github.workspace }}/diario/DIARIO PDF
          # Carpeta con los videos de actualidad bajados de Drive (desgrabador).
          VIDEOS_FOLDER: ${{ github.workspace }}/videos
          # Para subir el .mp4 del reel como asset de un GitHub Release (URL pública para IG).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "Ejecutando: main.py ${{ steps.cmd.outputs.args }}"
          python main.py ${{ steps.cmd.outputs.args }}

      - name: Guardar registros anti-repeticion (para no duplicar la proxima vez)
        if: always()
        run: |
          mkdir -p state
          cp "diario/NOTAS AUTOMATICAS/.publicado.json" state/ 2>/dev/null || true
          cp "diario/NOTAS AUTOMATICAS/.historias.json" state/ 2>/dev/null || true
          cp "diario/NOTAS AUTOMATICAS/.web.json" state/ 2>/dev/null || true
          for f in .tapa.json .farmacias.json .farmacias_cache.json .canal_story.json youtube-historias.json .newsletter.json .reel.json .videos_contabilidad.json; do
            [ -f "$f" ] && cp "$f" state/ || true
          done
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f state/
          if git diff --cached --quiet; then
            echo "Sin cambios de estado."
          else
            git commit -m "Estado anti-repeticion [skip ci]"
            # Push a prueba de choques: si otro push avanzo el repo, reordena y reintenta.
            ok=0
            for intento in 1 2 3 4 5; do
              if git pull --rebase --autostash && git push; then
                echo "Estado guardado."; ok=1; break
              fi
              echo "Push del estado rechazado, reintento $intento..."; sleep 4
            done
            if [ "$ok" != "1" ]; then echo "No se pudo guardar el estado tras varios intentos."; fi
          fi
